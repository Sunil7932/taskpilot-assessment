name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff + black)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - run: pip install -r requirements-dev.txt
      # Fail fast on style before spending time on tests.
      - run: ruff check .
      - run: black --check .

  test:
    name: Tests (pytest + Postgres)
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: taskpilot
          POSTGRES_PASSWORD: taskpilot
          POSTGRES_DB: taskpilot
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U taskpilot"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgresql+asyncpg://taskpilot:taskpilot@localhost:5432/taskpilot
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - run: pip install -r requirements-dev.txt
      # Verify migrations apply cleanly against a real database, then test.
      - run: alembic upgrade head
        env:
          DATABASE_URL: ${{ env.TEST_DATABASE_URL }}
      - run: pytest -q

  build:
    name: Build image
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build (and optionally push) image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: taskpilot:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      # To push to a registry, gate on a secret and enable the steps below:
      # - name: Log in to registry
      #   if: ${{ secrets.REGISTRY_TOKEN != '' }}
      #   uses: docker/login-action@v3
      #   with:
      #     registry: ghcr.io
      #     username: ${{ github.actor }}
      #     password: ${{ secrets.REGISTRY_TOKEN }}
